<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 1050 600" role="img" aria-labelledby="title desc">
  <title id="title">Carte de visite Le Patis - version photo immersive</title>
  <desc id="desc">Carte de visite horizontale pour le gîte Le Patis, avec photographie de la maison, panneau blanc et lien du site officiel.</desc>
  <defs>
    <clipPath id="rounded">
      <rect width="1050" height="600" rx="46"/>
    </clipPath>
    <clipPath id="photoCrop">
      <rect width="1050" height="600" rx="46"/>
    </clipPath>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <radialGradient id="vignette" cx="62%" cy="44%" r="72%">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.62" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.38"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#rounded)">
    <image href="../../src/assets/b72d0580f24e1b1ae3a81edc53413df639aa17da.png" x="0" y="-94" width="1050" height="788" preserveAspectRatio="xMidYMid slice" clip-path="url(#photoCrop)"/>
    <rect width="1050" height="600" fill="#0f1a12" opacity="0.36"/>
    <rect width="1050" height="600" fill="url(#vignette)"/>
    <path d="M0 0 H566 C496 142 486 319 562 600 H0Z" fill="#111d15" opacity="0.54"/>

    <g transform="translate(72 68)" filter="url(#cardShadow)">
      <rect width="470" height="464" rx="30" fill="#fffaf1"/>
      <rect x="30" y="30" width="92" height="92" rx="22" fill="#a82323"/>
      <path d="M76 46 L107 77 L107 109 L45 109 L45 77 Z" fill="#ffffff"/>
      <rect x="52" y="84" width="14" height="11" rx="2" fill="#a82323"/>
      <rect x="86" y="84" width="14" height="11" rx="2" fill="#a82323"/>
      <rect x="69" y="96" width="15" height="13" rx="2" fill="#a82323"/>

      <text x="30" y="190" fill="#1d231e" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700">Le Patis</text>
      <text x="32" y="239" fill="#2f5738" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Gîte 6 à 8 personnes</text>
      <text x="32" y="288" fill="#5a6257" font-family="Inter, Arial, sans-serif" font-size="23">Saint-Léonard-des-Bois</text>
      <text x="32" y="323" fill="#5a6257" font-family="Inter, Arial, sans-serif" font-size="23">Alpes Mancelles · Sarthe</text>

      <rect x="30" y="365" width="398" height="58" rx="29" fill="#a82323"/>
      <text x="70" y="402" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">lepatis.fr</text>
      <text x="332" y="403" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20">↗</text>
    </g>
  </g>
</svg>
