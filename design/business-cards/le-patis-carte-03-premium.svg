<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 1050 600" role="img" aria-labelledby="title desc">
  <title id="title">Carte de visite Le Patis - version premium sobre</title>
  <desc id="desc">Carte de visite horizontale pour le gîte Le Patis, avec fond sombre, monogramme maison et typographie élégante.</desc>
  <defs>
    <clipPath id="rounded">
      <rect width="1050" height="600" rx="46"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20261f"/>
      <stop offset="0.55" stop-color="#151b17"/>
      <stop offset="1" stop-color="#351b18"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c6a56b"/>
      <stop offset="1" stop-color="#a82323"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1050" height="600" fill="url(#bg)"/>
    <circle cx="888" cy="92" r="220" fill="#a82323" opacity="0.16"/>
    <circle cx="126" cy="538" r="210" fill="#c6a56b" opacity="0.12"/>
    <path d="M75 76 H975 V524 H75Z" fill="none" stroke="#c6a56b" stroke-width="3" opacity="0.52"/>
    <path d="M92 93 H958 V507 H92Z" fill="none" stroke="#c6a56b" stroke-width="1.5" opacity="0.28"/>

    <g transform="translate(458 80)">
      <rect x="0" y="0" width="134" height="134" rx="67" fill="#f7f0e1"/>
      <path d="M67 29 L107 69 L107 112 L27 112 L27 69 Z" fill="#a82323"/>
      <rect x="38" y="78" width="18" height="14" rx="2" fill="#f7f0e1"/>
      <rect x="78" y="78" width="18" height="14" rx="2" fill="#f7f0e1"/>
      <rect x="59" y="94" width="17" height="18" rx="2" fill="#f7f0e1"/>
    </g>

    <text x="525" y="290" text-anchor="middle" fill="#fff8eb" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700">Le Patis</text>
    <rect x="359" y="321" width="332" height="4" rx="2" fill="url(#line)"/>
    <text x="525" y="373" text-anchor="middle" fill="#e9dcc6" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Gîte 6 à 8 personnes</text>
    <text x="525" y="417" text-anchor="middle" fill="#cfc4b2" font-family="Inter, Arial, sans-serif" font-size="23">Alpes Mancelles · Saint-Léonard-des-Bois</text>

    <g transform="translate(312 471)">
      <text x="0" y="0" fill="#f7f0e1" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Site officiel</text>
      <text x="175" y="0" fill="#cfc4b2" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">lepatis.fr</text>
    </g>
  </g>
</svg>
